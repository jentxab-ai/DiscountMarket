name: Build and Upload APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: "8.7"
        cache-disabled: true

    - name: Build APK
      run: gradle assembleRelease

    - name: Find and Copy APK
      run: |
        find . -name "*.apk" -type f
        cp $(find . -name "*.apk" -type f | head -1) ./DiscountMarket.apk

    - name: Push APK
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add DiscountMarket.apk
        git commit -m "Add APK" || echo "No changes"
        git push
